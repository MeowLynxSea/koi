<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#13131f"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    
    <!-- KOI text gradient -->
    <linearGradient id="koiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8fbc8f"/>
      <stop offset="33%" stop-color="#708090"/>
      <stop offset="66%" stop-color="#5a6a7a"/>
      <stop offset="100%" stop-color="#8fbc8f"/>
    </linearGradient>
    
    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff79c6" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ff79c6" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#00ff99" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff99" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="280" fill="url(#bgGrad)" rx="12"/>
  <rect width="800" height="280" fill="url(#bgGrad)" rx="12" filter="url(#noise)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4a4a5a" stroke-width="0.3" opacity="0.15"/>
  </pattern>
  <rect width="800" height="280" fill="url(#grid)" rx="12"/>
  
  <!-- Decorative corner brackets -->
  <g stroke="#4a4a5a" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- Top left -->
    <path d="M 30 60 L 30 30 L 60 30"/>
    <!-- Top right -->
    <path d="M 740 30 L 770 30 L 770 60"/>
    <!-- Bottom left -->
    <path d="M 30 220 L 30 250 L 60 250"/>
    <!-- Bottom right -->
    <path d="M 740 250 L 770 250 L 770 220"/>
  </g>
  
  <!-- Terminal dots -->
  <g transform="translate(50, 52)">
    <circle cx="0" cy="0" r="5" fill="#ff5f56" opacity="0.8"/>
    <circle cx="16" cy="0" r="5" fill="#ffbd2e" opacity="0.8"/>
    <circle cx="32" cy="0" r="5" fill="#27c93f" opacity="0.8"/>
  </g>
  
  <!-- Main KOI text -->
  <text x="400" y="145" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="96" font-weight="700" fill="url(#koiGrad)" text-anchor="middle" letter-spacing="12" style="font-variant-ligatures: none;">KOI</text>
  
  <!-- KOI glow behind -->
  <text x="400" y="145" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="96" font-weight="700" fill="url(#koiGrad)" text-anchor="middle" letter-spacing="12" opacity="0.15" filter="url(#glow)" style="font-variant-ligatures: none;">KOI</text>
  
  <!-- Subtitle -->
  <text x="400" y="185" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#6c6c7c" text-anchor="middle" letter-spacing="4">Keep on Improving</text>
  
  <!-- Decorative accent line -->
  <line x1="200" y1="210" x2="600" y2="210" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Version badge area -->
  <g transform="translate(400, 235)" text-anchor="middle">
    <rect x="-60" y="-10" width="120" height="22" rx="4" fill="#13131f" stroke="#4a4a5a" stroke-width="0.5" opacity="0.6"/>
    <text x="0" y="5" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#6c6c7c">TUI Coding Agent</text>
  </g>
  
  <!-- Side decorations -->
  <g opacity="0.08">
    <!-- Left side code-like decoration -->
    <text x="70" y="180" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#4a4a5a" transform="rotate(-90 70 180)">const agent = new KOI();</text>
    <!-- Right side -->
    <text x="730" y="100" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#4a4a5a" transform="rotate(90 730 100)">await agent.improve();</text>
  </g>
</svg>