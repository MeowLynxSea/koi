name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.30)'
        required: true

jobs:
  # Each platform builds and uploads its own native libraries
  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload native
        uses: actions/upload-artifact@v4
        with:
          name: native-darwin-arm64
          path: native/
          retention-days: 7

  build-darwin-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload native
        uses: actions/upload-artifact@v4
        with:
          name: native-darwin-x64
          path: native/
          retention-days: 7

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload native
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: native/
          retention-days: 7

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload native
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-arm64
          path: native/
          retention-days: 7

  build-win32-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload native
        uses: actions/upload-artifact@v4
        with:
          name: native-win32-x64
          path: native/
          retention-days: 7

  build-win32-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload native
        uses: actions/upload-artifact@v4
        with:
          name: native-win32-arm64
          path: native/
          retention-days: 7

  # Merge all native libraries into one artifact
  merge-native:
    needs: [build-darwin-arm64, build-darwin-x64, build-linux-x64, build-linux-arm64, build-win32-x64, build-win32-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all native libraries
        uses: actions/download-artifact@v4
        with:
          path: native/
          pattern: native-*
          merge-multiple: true
      - name: Verify merged native libraries
        run: |
          echo "=== native/opentui ===" && ls -laR native/opentui/
          echo "=== native/onnx ===" && ls -laR native/onnx/
      - name: Upload merged native
        uses: actions/upload-artifact@v4
        with:
          name: native-merged
          path: native/
          retention-days: 7

  # Publish to npm using merged native libraries
  publish:
    needs: [merge-native]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.npmjs.com/package/@meowlynxsea/koi

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: |
          cd src/cce/web/frontend && bun install && bun run build

      - name: Download merged native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-merged
          path: native/

      - name: Build
        run: bun run build

      - name: Verify native libraries
        run: |
          echo "=== native/opentui ===" && ls -laR native/opentui/
          echo "=== native/onnx ===" && ls -laR native/onnx/

      - name: Update version
        run: |
          npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Configure npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
