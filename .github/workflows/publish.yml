name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.21)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.npmjs.com/package/@meowlynxsea/koi

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for all platforms
        run: bun run build

      - name: Download all native libraries
        uses: actions/download-artifact@v4
        with:
          path: native/
          pattern: native-*
          merge-multiple: true

      - name: Verify native libraries
        run: |
          echo "=== native/opentui ===" && ls -la native/opentui/
          echo "=== native/onnx ===" && ls -laR native/onnx/

      - name: Publish to npm
        run: |
          npm config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            native/**/*.dylib
            native/**/*.so*
            native/**/*.dll
            native/**/onnxruntime*.node
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
