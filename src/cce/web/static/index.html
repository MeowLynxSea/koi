<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat's Context Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div id="app" class="container mx-auto px-4 py-6 max-w-6xl">
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-cyan-400">🧠 Cat's Context Engine</h1>
      <p class="text-gray-400 mt-1">Namespace: <span id="namespace" class="text-white font-mono">-</span></p>
    </header>

    <nav class="flex gap-2 mb-6 border-b border-gray-700 pb-2">
      <button class="tab-btn active px-4 py-2 rounded-t bg-gray-800 text-cyan-400" data-tab="contexts">Contexts</button>
      <button class="tab-btn px-4 py-2 rounded-t bg-gray-800 text-gray-400 hover:text-white" data-tab="brain">Brain</button>
      <button class="tab-btn px-4 py-2 rounded-t bg-gray-800 text-gray-400 hover:text-white" data-tab="maintenance">Maintenance</button>
    </nav>

    <!-- Contexts Tab -->
    <section id="tab-contexts" class="tab-pane">
      <div class="flex gap-2 mb-4">
        <input id="search-input" type="text" placeholder="Search contexts..." class="flex-1 px-3 py-2 bg-gray-800 border border-gray-700 rounded text-white">
        <button id="search-btn" class="px-4 py-2 bg-cyan-600 rounded hover:bg-cyan-500">Search</button>
      </div>
      <div id="contexts-list" class="space-y-2"></div>
    </section>

    <!-- Brain Tab -->
    <section id="tab-brain" class="tab-pane hidden">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-gray-800 rounded p-4">
          <h2 class="text-lg font-semibold text-purple-400 mb-2">Working Memory</h2>
          <div id="wm-slots" class="space-y-2"></div>
        </div>
        <div class="bg-gray-800 rounded p-4">
          <h2 class="text-lg font-semibold text-purple-400 mb-2">Activation Query</h2>
          <input id="activation-input" type="text" placeholder="Type to activate..." class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded text-white mb-2">
          <button id="activation-btn" class="px-4 py-2 bg-purple-600 rounded hover:bg-purple-500">Compute</button>
          <div id="activation-results" class="mt-2 space-y-1 text-sm"></div>
        </div>
      </div>
    </section>

    <!-- Maintenance Tab -->
    <section id="tab-maintenance" class="tab-pane hidden">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-gray-800 rounded p-4 text-center">
          <div class="text-2xl font-bold text-cyan-400" id="stat-nodes">-</div>
          <div class="text-xs text-gray-400">Nodes</div>
        </div>
        <div class="bg-gray-800 rounded p-4 text-center">
          <div class="text-2xl font-bold text-cyan-400" id="stat-memories">-</div>
          <div class="text-xs text-gray-400">Memories</div>
        </div>
        <div class="bg-gray-800 rounded p-4 text-center">
          <div class="text-2xl font-bold text-cyan-400" id="stat-edges">-</div>
          <div class="text-xs text-gray-400">Edges</div>
        </div>
        <div class="bg-gray-800 rounded p-4 text-center">
          <div class="text-2xl font-bold text-cyan-400" id="stat-episodes">-</div>
          <div class="text-xs text-gray-400">Episodes</div>
        </div>
      </div>
      <div class="flex gap-2">
        <button id="btn-sync" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-500">Sync Project</button>
        <button id="btn-dream" class="px-4 py-2 bg-purple-600 rounded hover:bg-purple-500">Dream Consolidate</button>
        <button id="btn-rebuild" class="px-4 py-2 bg-amber-600 rounded hover:bg-amber-500">Rebuild Index</button>
      </div>
      <div id="maintenance-log" class="mt-4 p-3 bg-gray-800 rounded text-sm font-mono h-40 overflow-y-auto"></div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
